<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Note | Nepal Student Notes</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <script src="notes.js" defer></script>
</head>
<body class="page-shell">
    <header class="site-header">
        <div class="container header-grid">
            <a class="brand" href="index.html">Nepal Student Notes</a>
            <nav>
                <a href="index.html">Home</a>
                <a href="notes.html">Notes</a>
                <a href="login.html">Login</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="card">
            <div class="section-title"><span></span><h2>Chapter Preview</h2></div>
            <p>View the selected chapter on its own page. Login to enable preview, download, and sharing for the note.</p>
            <div id="preview-message" class="note-banner"></div>
            <div id="preview-breadcrumb" class="breadcrumbs hidden"></div>
            <div id="preview-card" class="card hidden">
                <h3 id="preview-title"></h3>
                <p id="preview-description"></p>
                <div class="preview-actions">
                    <a class="button" id="preview-view" href="#" target="_blank" rel="noopener">Preview PDF</a>
                    <a class="button button-soft" id="preview-download" href="#" target="_blank" rel="noopener">Download</a>
                    <button class="button button-soft" id="preview-share" type="button">Share</button>
                </div>
                <p class="form-note" id="preview-note"></p>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container footer-grid">
            <p>&copy; 2026 Nepal Student Notes. Built for students and teachers.</p>
            <div class="footer-links">
                <a href="privacy.html">Privacy</a>
                <a href="terms.html">Terms</a>
                <a href="disclaimer.html">Disclaimer</a>
            </div>
        </div>
    </footer>
</body>
</html>
